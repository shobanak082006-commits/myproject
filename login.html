<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
height:100vh;
background:linear-gradient(135deg,#667eea,#764ba2);
display:flex;
flex-direction:column;
}

/* College Header */

.header{
width:100%;
background:#002147;
color:white;
text-align:center;
padding:20px;
}

.header h1{
margin:0;
font-size:30px;
}

.header p{
margin:5px;
font-size:16px;
}

/* Center Login */

.container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
text-align:center;
width:320px;
}

.login-box h2{
margin-bottom:20px;
color:#333;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:25px;
border:1px solid #ccc;
outline:none;
}

button{
width:100%;
padding:10px;
border-radius:25px;
border:none;
background:#667eea;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#5a67d8;
}

</style>
</head>

<body>

<div class="header">

<h1>S. Vellaichamy Nadar College</h1>
<p>Admin Based Student Management System</p>

</div>

<div class="container">

<div class="login-box">

<h2>Admin Login</h2>

<form action="/login" method="POST">
<input type="text" name="phone" placeholder="Phone" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>

</div>

</div>

</body>
</html>
